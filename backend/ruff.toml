# Ruff configuration for backend linting and formatting
# See: https://docs.astral.sh/ruff/configuration/

extend-exclude = [
    "venv",
    ".venv",
    "env",
    ".env",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    "htmlcov",
    "dist",
    "build",
    "*.egg-info",
    "testing-documents",
]

line-length = 120
target-version = "py311"

[lint]

fixable = ["ALL"]
